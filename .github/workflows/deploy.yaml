name: Deploy avm-platform
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  terraform:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_AVM_OIDC_ROLE_ARN }}
          aws-region: eu-west-1
      - run: terraform init -backend-config="bucket=avm-terraform-state" -backend-config="dynamodb_table=avm-terraform-locks" -backend-config="region=eu-west-1"
      - run: terraform validate
      - run: terraform plan -input=false
        if: github.event_name == 'pull_request'
      - run: terraform apply -input=false -auto-approve
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
