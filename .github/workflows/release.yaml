name: Release

on:
  push:
    branches: [ main ]
    paths:
      - '**.tf'
      - '**.tfvars'
      - '.github/release.yml' # Re-trigger if config changes

permissions:
  contents: write

jobs:
  release:
    # Point to the shared workflow
    uses: BT-IT-Infrastructure-CloudOps/aws-workflows/.github/workflows/reusable-tagging.yaml@v1.0.5
    secrets:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}