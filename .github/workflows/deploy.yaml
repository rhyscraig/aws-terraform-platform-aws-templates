name: Deploy Platform (Control Tower)

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  lint:
    uses: rhyscraig/aws-terraform-platform-aws-workflows/.github/workflows/reusable-static-analysis.yaml@v0.0.2

  plan:
    needs: lint
    uses: rhyscraig/aws-terraform-platform-aws-workflows/.github/workflows/reusable-tf-plan.yaml@main
    with:
      env_name: "prod"
    secrets:
      OIDC_ROLE_ARN: ${{ secrets.AWS_AVM_OIDC_ROLE_ARN }}
      GH_PAT: ${{ secrets.GH_PAT }}

  apply:
    needs: plan
    if: github.ref == 'refs/heads/main'
    uses: rhyscraig/aws-terraform-platform-aws-workflows/.github/workflows/reusable-tf-apply.yaml@main
    with:
      env_name: "prod"
    secrets:
      OIDC_ROLE_ARN: ${{ secrets.AWS_AVM_OIDC_ROLE_ARN }}
      GH_PAT: ${{ secrets.GH_PAT }}
